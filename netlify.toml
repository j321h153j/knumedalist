[build]
  command = "rm -rf dist && mkdir -p dist && cp index.html admin.html app.js admin.js data.js styles.css dist/ && cp -R assets dist/assets || true"
  publish = "dist"
  
[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
